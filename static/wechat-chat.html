<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>微信聊天</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #ededed;
      display: flex;
      flex-direction: column;
    }

    /* ===== 顶部导航 ===== */
    .nav-bar {
      flex-shrink: 0;
      height: 44px;
      background: #ededed;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 0.5px solid #d9d9d9;
      padding: 0 12px;
    }

    .nav-bar .nav-back {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-bar .nav-back svg {
      width: 20px;
      height: 20px;
      fill: #181818;
    }

    .nav-bar .nav-title {
      font-size: 17px;
      font-weight: 600;
      color: #181818;
    }

    .nav-bar .nav-more {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-bar .nav-more svg {
      width: 20px;
      height: 20px;
      fill: #181818;
    }

    /* ===== 聊天区域 ===== */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 12px 8px;
      background: #ededed;
    }

    .msg-row {
      display: flex;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .msg-row.self {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      flex-shrink: 0;
      background: #c9c9c9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .msg-avatar svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .msg-row.self .msg-avatar {
      background: #95ec69;
    }

    .msg-bubble {
      max-width: 68%;
      margin: 0 10px;
      position: relative;
    }

    .msg-text {
      background: #fff;
      color: #181818;
      font-size: 16px;
      line-height: 1.5;
      padding: 10px 12px;
      border-radius: 6px;
      word-break: break-word;
    }

    .msg-row.self .msg-text {
      background: #95ec69;
    }

    /* 小三角 */
    .msg-bubble::before {
      content: '';
      position: absolute;
      top: 10px;
      width: 0;
      height: 0;
      border: 6px solid transparent;
    }

    .msg-row:not(.self) .msg-bubble::before {
      left: -10px;
      border-right-color: #fff;
      border-left: 0;
    }

    .msg-row.self .msg-bubble::before {
      right: -10px;
      border-left-color: #95ec69;
      border-right: 0;
    }

    /* 时间标签 */
    .time-label {
      text-align: center;
      margin-bottom: 14px;
      font-size: 12px;
      color: #b2b2b2;
    }

    /* ===== 底部输入栏 ===== */
    .input-bar {
      flex-shrink: 0;
      background: #f7f7f7;
      border-top: 0.5px solid #d9d9d9;
      padding: 8px 10px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .input-bar .bar-btn {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 2px;
    }

    .input-bar .bar-btn svg {
      width: 24px;
      height: 24px;
      fill: #181818;
    }

    .input-bar .bar-btn:active {
      background: #e0e0e0;
    }

    .input-wrap {
      flex: 1;
      min-height: 36px;
      max-height: 100px;
      background: #fff;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 16px;
      line-height: 1.4;
      color: #181818;
      outline: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      word-break: break-word;
    }

    .input-wrap:empty::before {
      content: attr(data-placeholder);
      color: #b2b2b2;
    }

    /* ===== +号面板 ===== */
    .plus-panel {
      flex-shrink: 0;
      background: #f7f7f7;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .plus-panel.show {
      max-height: 230px;
    }

    .plus-panel-inner {
      padding: 16px 20px 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px 8px;
    }

    .plus-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .plus-item:active .plus-icon {
      background: #d9d9d9;
    }

    .plus-icon {
      width: 56px;
      height: 56px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
      transition: background 0.15s;
    }

    .plus-icon svg {
      width: 28px;
      height: 28px;
    }

    .plus-label {
      font-size: 11px;
      color: #181818;
    }

    /* ===== 位置/名片占位 ===== */
    .placeholder-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150;
    }

    .placeholder-overlay.show {
      display: flex;
    }

    .placeholder-box {
      background: #fff;
      border-radius: 14px;
      padding: 30px 28px 24px;
      text-align: center;
      width: 260px;
    }

    .placeholder-box .ph-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .placeholder-box .ph-title {
      font-size: 17px;
      font-weight: 600;
      color: #181818;
      margin-bottom: 8px;
    }

    .placeholder-box .ph-desc {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .placeholder-box .ph-btn {
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 0;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }

    .placeholder-box .ph-btn:active {
      background: #06ad56;
    }
  </style>
</head>

<body>

  <!-- 顶部导航 -->
  <div class="nav-bar">
    <div class="nav-back">
      <svg viewBox="0 0 24 24">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />

      </svg>
    </div>
    <div class="input-wrap" id="inputWrap" contenteditable="true" data-placeholder="输入消息..." oninput="onInputChange()">
    </div>
    <div class="bar-btn" id="btnPlus" onclick="togglePlusPanel()">
      <svg viewBox="0 0 24 24" id="plusIcon">

  <!-- +号面板 -->

      <!-- 文件 -->

  <!-- 通用占位弹窗 -->

  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <script>
    // VConsole 默认会挂载到 `window.VConsole` 上
    var vConsole = new window.VConsole();
  </script>
  <script>
    // ========== 状态 ==========
    var plusOpen = false;
    var isVoiceMode = false;

    // ========== +号面板 ==========
    function togglePlusPanel() {
      var panel = document.getElementById('plusPanel');
      var icon = document.getElementById('plusIcon');
      plusOpen = !plusOpen;
      if (plusOpen) {
        panel.classList.add('show');
        icon.innerHTML = '<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" transform="rotate(45 12 12)"/>';
      } else {
        panel.classList.remove('show');
        icon.innerHTML = '<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>';
      }
      // 收起键盘
      document.getElementById('inputWrap').blur();
      scrollToBottom();
    }

    function closePlusPanel() {
      if (!plusOpen) return;
      plusOpen = false;
      document.getElementById('plusPanel').classList.remove('show');
      document.getElementById('plusIcon').innerHTML = '<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>';
    }

    // ========== 输入框逻辑 ==========
    function onInputChange() {
      var text = document.getElementById('inputWrap').textContent.trim();
      var btnSend = document.getElementById('btnSend');
      var btnPlus = document.getElementById('btnPlus');
      if (text.length > 0) {
        btnSend.style.display = 'flex';
        btnPlus.style.display = 'none';
        closePlusPanel();
      } else {
        btnSend.style.display = 'none';
        btnPlus.style.display = 'flex';
      }
    }

    function toggleVoice() {
      isVoiceMode = !isVoiceMode;
      var input = document.getElementById('inputWrap');
      var btnVoice = document.getElementById('btnVoice');
      if (isVoiceMode) {
        input.style.display = 'none';
        input.insertAdjacentHTML('afterend',
          '<div id="voiceBtn" style="flex:1;height:36px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#181818;cursor:pointer;user-select:none;" onclick="openRecord()">按住 说话</div>'
        );
        btnVoice.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="#07c160"/></svg>';
        closePlusPanel();
      } else {
        var vb = document.getElementById('voiceBtn');
        if (vb) vb.remove();
        input.style.display = '';
        btnVoice.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
      }
    }

    // ========== 发送文字消息 ==========
    function sendTextMsg() {
      var input = document.getElementById('inputWrap');
      var text = input.textContent.trim();
      if (!text) return;
      appendMsg(text, true);
      input.textContent = '';
      onInputChange();
      scrollToBottom();
    }

    // ========== 追加消息 ==========
    function appendMsg(text, isSelf, type) {
      var area = document.getElementById('chatArea');
      var cls = isSelf ? 'self' : '';
      var bubble = '<div class="msg-text">' + text + '</div>';
      if (type === 'image') {
        bubble = '<div class="msg-text" style="padding:4px;"><img src="' + text + '" style="max-width:100%;border-radius:4px;display:block;" /></div>';
      }
      area.insertAdjacentHTML('beforeend',
        '<div class="msg-row ' + cls + '">' +
        '<div class="msg-avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>' +
        '<div class="msg-bubble">' + bubble + '</div></div>'
      );
    }

    function scrollToBottom() {
      setTimeout(function () {
        var area = document.getElementById('chatArea');
        area.scrollTop = area.scrollHeight;
      }, 50);
    }

    // ========== 录音（原生） ==========
    function openRecord() {
      console.log('点击录音');

      closePlusPanel();
      if (window.UniWebView) {
        window.UniWebView.openRecord();
      } else {
        console.error('当前不在 UniApp 原生基座 WebView 环境中');
        appendMsg('🎤 录音功能需要原生环境支持', true);
        scrollToBottom();
      }
    }

    // ========== 相册 ==========
    function openAlbum() {
      console.log('点击相册');
      closePlusPanel();
      if (window.UniWebView) {
        window.UniWebView.openPhotoAlbum(9);
      } else {
        console.error('当前不在 UniApp 原生基座 WebView 环境中');
        appendMsg('🖼️ 相册功能需要原生环境支持', true);
        scrollToBottom();
      }
    }

    // ========== 拍摄 ==========
    function openCamera() {
      console.log('点击拍摄');
      closePlusPanel();
      if (window.UniWebView) {
        window.UniWebView.openCamera();
      } else {
        console.error('当前不在 UniApp 原生基座 WebView 环境中');
        appendMsg('📷 拍摄功能需要原生环境支持', true);
        scrollToBottom();
      }
    }

    // ========== 文件选择 ==========
    function openFilePicker() {
      closePlusPanel();
      document.getElementById('filePicker').click();
    }

    function handleFilePicked(e) {
      var file = e.target.files[0];
      if (!file) return;
      appendMsg('📎 文件: ' + file.name, true);
      scrollToBottom();
      e.target.value = '';
    }

    // ========== 通用占位弹窗 ==========
    var placeholderData = {
      location: { icon: '📍', title: '位置', desc: '获取位置信息需要定位权限，当前为 H5 模拟环境，此功能需在原生端使用。' },
      contact: { icon: '👤', title: '名片', desc: '分享联系人名片，当前为 H5 模拟环境，此功能需在原生端使用。' },
      favorite: { icon: '⭐', title: '收藏', desc: '从收藏中选择内容发送，当前为 H5 模拟环境，此功能需在原生端使用。' },
      redpacket: { icon: '🧧', title: '红包', desc: '发红包功能需要支付权限，当前为 H5 模拟环境，此功能需在原生端使用。' }
    };

    function showPlaceholder(key) {
      closePlusPanel();
      var d = placeholderData[key];
      document.getElementById('phIcon').textContent = d.icon;
      document.getElementById('phTitle').textContent = d.title;
      document.getElementById('phDesc').textContent = d.desc;
      document.getElementById('placeholderOverlay').classList.add('show');
    }

    function closePlaceholder() {
      document.getElementById('placeholderOverlay').classList.remove('show');
    }

    // ========== 键盘弹起时收起面板 ==========
    document.getElementById('inputWrap').addEventListener('focus', function () {
      if (plusOpen) closePlusPanel();
    });

    // 回车发送
    document.getElementById('inputWrap').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendTextMsg();
      }
    });
    // 1. 提前定义全局接收函数 (一定要挂在 window 上)
    window.onCameraResult = function (result) {
      console.log('全局收到照片数据', result);
      if (result && result.base64) {
        var src = result.base64.indexOf('data:') === 0 ? result.base64 : 'data:image/jpeg;base64,' + result.base64;
        appendMsg(src, true, 'image');
        scrollToBottom();
      }
    };
    // 1. 在 H5 的全局挂载接收结果的回调
    window.onPhotoAlbumResult = function (result) {
      if (result.success) {
        // result.uris 是原生路径的数组
        // result.base64s 是转换好的 base64 数组，可以直接放进 <img> 的 src 里

        console.log('成功获取到图片：', result.base64s);

        if (result.base64s.length > 0) {
          result.base64s.forEach(function (b64) {
            var src = b64.indexOf('data:') === 0 ? b64 : 'data:image/jpeg;base64,' + b64;
            appendMsg(src, true, 'image');
          });
          scrollToBottom();
        }
      } else {
        console.log('取消选择或发生异常：', result.error);
      }
    };
  </script>

</body>

</html>
